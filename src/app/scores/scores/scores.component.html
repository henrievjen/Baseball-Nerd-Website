<div class="scores-page page-enter">
  <header class="page-header">
    <h1 class="page-title">SCORES &amp; GAMES</h1>
  </header>

  <!-- Date Navigation -->
  <div class="date-nav-wrapper">
    <div class="date-strip">
      <button
        *ngFor="let tab of dateTabs; let i = index"
        class="date-tab"
        [class.active]="i === activeDateIdx"
        (click)="selectDate(i)">
        <span class="date-tab-day">{{ tab.label }}</span>
        <span class="date-tab-date">{{ tab.shortDate }}</span>
      </button>
    </div>

    <div class="calendar-picker">
      <button class="calendar-btn" (click)="picker.showPicker()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
      </button>
      <input #picker type="date" class="hidden-date-input" (change)="onCalendarDateChange($event)">
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="spinner-wrap">
    <div class="spinner"></div>
    <span>Loading games…</span>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && games.length === 0" class="empty-state">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
    </svg>
    <p>No games scheduled for this date</p>
  </div>

  <!-- Games Grid -->
  <div *ngIf="!loading && games.length > 0" class="games-grid">
    <app-score-card
      *ngFor="let game of games; trackBy: trackByGamePk"
      [game]="game"
      (gameSelected)="openGame($event)">
    </app-score-card>
  </div>
</div>

<!-- Game Detail Modal -->
<app-game-detail
  *ngIf="selectedGame"
  [game]="selectedGame"
  [boxscore]="boxscore"
  [loading]="loadingDetail"
  (closed)="closeGame()">
</app-game-detail>
