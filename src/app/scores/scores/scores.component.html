<div class="scores-page page-enter">
  <header class="page-header">
    <h1 class="page-title">SCORES &amp; GAMES</h1>
  </header>

  <!-- Date Navigation -->
  <div class="date-nav-wrapper">

    <!-- Refresh to today (left) -->
    <div class="today-picker">
      <button
              class="today-btn"
              [class.is-today]="isOnToday"
              (click)="goToToday()"
              title="Go to today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>

    <div class="date-strip">
      <button
              *ngFor="let tab of dateTabs; let i = index"
              class="date-tab"
              [class.active]="i === activeDateIdx"
              (click)="selectDate(i)">
        <span class="date-tab-day">{{ tab.label }}</span>
        <span class="date-tab-date">{{ tab.shortDate }}</span>
      </button>
    </div>

    <div class="calendar-picker">
      <!-- Trigger button -->
      <button class="calendar-btn" (click)="toggleCalendar()" [class.open]="calendarOpen" title="Pick a date">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
        </svg>
      </button>

      <!-- Custom calendar dropdown -->
      <div class="cal-dropdown" *ngIf="calendarOpen" (click)="$event.stopPropagation()">

        <!-- Month header -->
        <div class="cal-header">
          <button class="cal-nav" (click)="prevMonth()" title="Previous month">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="cal-month-label">{{ calendarMonthLabel }}</span>
          <button class="cal-nav" (click)="nextMonth()" title="Next month">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>

        <!-- Day-of-week labels -->
        <div class="cal-dow-row">
          <span *ngFor="let d of dayLabels" class="cal-dow">{{ d }}</span>
        </div>

        <!-- Day grid -->
        <div class="cal-grid">
          <button
                  *ngFor="let day of calendarDays"
                  class="cal-day"
                  [class.other-month]="day.isOtherMonth"
                  [class.is-today]="day.isToday"
                  [class.is-selected]="day.isSelected"
                  (click)="selectCalendarDay(day)">
            {{ day.day }}
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="spinner-wrap">
    <div class="spinner"></div>
    <span>Loading games…</span>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && games.length === 0" class="empty-state">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
    </svg>
    <p>No games scheduled for this date</p>
  </div>

  <!-- Games Grid -->
  <div *ngIf="!loading && games.length > 0" class="games-grid">
    <app-score-card
            *ngFor="let game of games; trackBy: trackByGamePk"
            [game]="game"
            [hasLiveGames]="hasLiveGames"
            (gameSelected)="openGame($event)">
    </app-score-card>
  </div>
</div>

<!-- Game Detail Modal -->
<app-game-detail
        *ngIf="selectedGame"
        [game]="selectedGame"
        [boxscore]="boxscore"
        [loading]="loadingDetail"
        [plays]="plays"
        [loadingPlays]="loadingPlays"
        [liveFeed]="liveFeed"
        (closed)="closeGame()">
</app-game-detail>
